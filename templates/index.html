{% extends 'base.html' %}
{% block content %}
<h1>Posts</h1>

{% for post in posts %}
<article class="card">
    <h2><a href="/posts/{{ post.id }}">{{ post.title }}</a></h2>
    <p>Made by {{ post.username }} on {{ post.created_at[:10] }}</p>
    <p>{{ post.content[:200] }}{% if post.content|length > 200 %}...{%endif %}</p>
</article>
{% else %}
<p>No posts yet.</p>
{% endfor %}
{% endblock %}
