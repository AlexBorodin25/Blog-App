{% extends "base.html" %}
{% block content %}
<h1>Edit Comment</h1>

<form method ="post">
    <textarea name="content" rows="5" required>{{ comment.content }}</textarea>
    <button type="submit">Save comment</button>
    <a href="{{ url_for('post_detail', post_id=comment.post.id) }}">Cancel</a>
</form>
{% endblock %}
